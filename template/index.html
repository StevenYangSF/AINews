<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily - 全网 AI 动态聚合</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'] },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' }
        }
      }
    }
  </script>
  <style>
    .tab-active { background: #000; color: #fff; }
    .dark .tab-active { background: #fff; color: #000; }
    .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .dark .card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .hot-pulse { animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .tag { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.02em; }
    .gradient-hot { background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%); }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  </style>
</head>
<body class="bg-[#f5f5f7] dark:bg-[#1d1d1f] text-[#1d1d1f] dark:text-[#f5f5f7] min-h-screen font-sans antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white/70 dark:bg-[#1d1d1f]/80 glass border-b border-gray-200/50 dark:border-gray-700/50">
    <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl gradient-hot flex items-center justify-center">
          <span class="text-white text-sm font-bold">AI</span>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight">AI Daily</h1>
          <p class="text-xs text-gray-500 dark:text-gray-400" id="header-date">加载中...</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2 bg-orange-50 dark:bg-orange-900/20 px-3 py-1.5 rounded-full">
          <span class="text-xs text-orange-600 dark:text-orange-400 font-medium">热度</span>
          <span class="text-sm font-bold text-orange-600 dark:text-orange-400" id="heat-index">--</span>
        </div>
        <button id="theme-toggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" aria-label="切换主题">
          <svg class="w-4 h-4 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
          <svg class="w-4 h-4 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 py-8">

    <!-- 今日爆款 -->
    <section id="hot-section" class="mb-10 hidden">
      <div class="bg-white dark:bg-[#2d2d2f] rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-gray-800">
        <div class="flex items-center gap-2 mb-4">
          <span class="hot-pulse text-lg">🔥</span>
          <h2 class="text-sm font-bold uppercase tracking-wider text-orange-600 dark:text-orange-400">今日超级头条</h2>
        </div>
        <div id="hot-items" class="space-y-4"></div>
      </div>
    </section>

    <!-- Tab 导航 -->
    <nav class="flex flex-wrap gap-2 mb-8 sticky top-[73px] z-40 bg-[#f5f5f7]/80 dark:bg-[#1d1d1f]/80 glass py-3 -mx-5 px-5">
      <button class="tab-btn tab-active px-4 py-2 rounded-full text-xs font-semibold transition-all" data-tab="github">🚀 GitHub</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="embodied">🤖 具身智能</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="autoAi">🚗 汽车AI</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="testing">🧪 AI测试</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="labs">🔬 实验室</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="media">📰 行业资讯</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="weekly">📋 深度周报</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="papers">📄 论文</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="community">💬 社区</button>
      <button class="tab-btn px-4 py-2 rounded-full text-xs font-semibold bg-gray-200/60 dark:bg-gray-800/60 text-gray-600 dark:text-gray-400 transition-all" data-tab="china">🇨🇳 国内</button>
    </nav>

    <!-- 关键词过滤模块 -->
    <section id="keyword-filter" class="mb-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">🔍 关键词筛选</span>
        <button id="keyword-clear" class="text-[11px] text-blue-500 hover:text-blue-700 dark:text-blue-400 font-medium hidden">清除筛选</button>
      </div>
      <div id="keyword-pills" class="flex flex-wrap gap-2">
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="GPT">GPT</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Claude">Claude</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Agent">Agent</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="机器人">机器人</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="自动驾驶">自动驾驶</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="开源">开源</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="VLA">VLA</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="大模型">大模型</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="芯片">芯片</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Tesla">Tesla</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="华为">华为</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="OpenAI">OpenAI</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Playwright">Playwright</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Selenium">Selenium</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="测试">测试</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="SikuliX">SikuliX</button>
        <button class="kw-pill px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-all" data-kw="Appium">Appium</button>
      </div>
    </section>

    <!-- Tab 内容区 -->
    <div id="tab-github" class="tab-content"><div id="github-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-embodied" class="tab-content hidden"><div id="embodied-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-autoAi" class="tab-content hidden"><div id="autoAi-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-testing" class="tab-content hidden"><div id="testing-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-labs" class="tab-content hidden"><div id="labs-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-media" class="tab-content hidden"><div id="media-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-weekly" class="tab-content hidden"><div id="weekly-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2"></div></div>
    <div id="tab-papers" class="tab-content hidden"><div id="papers-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-community" class="tab-content hidden"><div id="community-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
    <div id="tab-china" class="tab-content hidden"><div id="china-list" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"></div></div>
  </main>

  <!-- Footer -->
  <footer class="max-w-7xl mx-auto px-5 py-8 border-t border-gray-200 dark:border-gray-800">
    <div class="flex flex-col sm:flex-row justify-between items-center gap-2 text-xs text-gray-400">
      <span id="footer-stats">数据加载中...</span>
      <span>Powered by GitHub Actions · Gemini AI</span>
    </div>
  </footer>

  <script>
    const DATA = __DAILY_DATA__;

    // ===== Theme =====
    (function(){
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    document.getElementById('theme-toggle').onclick = () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    };

    // ===== Tabs =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('tab-active');
          b.classList.add('bg-gray-200/60', 'dark:bg-gray-800/60', 'text-gray-600', 'dark:text-gray-400');
        });
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        btn.classList.add('tab-active');
        btn.classList.remove('bg-gray-200/60', 'dark:bg-gray-800/60', 'text-gray-600', 'dark:text-gray-400');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
      });
    });

    // ===== Render =====
    const tagColors = {
      '模型发布': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300',
      '开源工具': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300',
      'AI Infra': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
      '行业商业': 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
      '论文解读': 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-300',
      'AI 安全': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300',
      '智能体': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300',
      '产品应用': 'bg-pink-100 text-pink-700 dark:bg-pink-900/30 dark:text-pink-300',
      '具身智能': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300',
      '人形机器人': 'bg-teal-100 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300',
      '自动驾驶': 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-300',
      '端到端智驾': 'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-300',
      'AI测试': 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
      '自动化测试': 'bg-lime-100 text-lime-700 dark:bg-lime-900/30 dark:text-lime-300'
    };

    function renderCard(item) {
      const tags = (item.tags || []).map(t =>
        `<span class="tag ${tagColors[t] || 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'}">${t}</span>`
      ).join('');

      const stars = item.metadata?.stars ? `<div class="flex items-center gap-1 text-yellow-500 text-xs font-semibold"><span>⭐</span><span>+${item.metadata.stars.toLocaleString()}</span></div>` : '';
      const lang = item.metadata?.language ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 font-mono">${item.metadata.language}</span>` : '';
      const sources = (item.sources || [item.source || '']).filter(Boolean);
      const sourceText = sources[0] || '';
      const mainUrl = (item.urls && item.urls[0]) || item.url || '#';

      return `
        <a href="${mainUrl}" target="_blank" rel="noopener" class="card block bg-white dark:bg-[#2d2d2f] rounded-2xl p-5 border border-gray-100 dark:border-gray-800 shadow-sm">
          <div class="flex items-start justify-between gap-2 mb-3">
            <h3 class="font-semibold text-[15px] leading-snug line-clamp-2 flex-1">${item.title}</h3>
            ${stars}
          </div>
          ${item.summary ? `<p class="text-[13px] text-gray-500 dark:text-gray-400 mb-3 line-clamp-3 leading-relaxed">${item.summary}</p>` : (item.content ? `<p class="text-[13px] text-gray-500 dark:text-gray-400 mb-3 line-clamp-2 leading-relaxed">${item.content.slice(0,120)}</p>` : '')}
          <div class="flex items-center justify-between gap-2">
            <div class="flex flex-wrap gap-1">${tags} ${lang}</div>
            <span class="text-[11px] text-gray-400 dark:text-gray-500 whitespace-nowrap font-medium">${sourceText}</span>
          </div>
        </a>
      `;
    }

    function renderWeeklyCard(item) {
      const mainUrl = (item.urls && item.urls[0]) || item.url || '#';
      const sources = (item.sources || [item.source || '']).filter(Boolean);
      return `
        <a href="${mainUrl}" target="_blank" rel="noopener" class="card block bg-white dark:bg-[#2d2d2f] rounded-2xl p-6 border border-gray-100 dark:border-gray-800 shadow-sm">
          <div class="flex items-center gap-2 mb-3">
            <span class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider">📋 周报</span>
            <span class="text-[11px] text-gray-400">${sources[0] || ''}</span>
          </div>
          <h3 class="font-bold text-lg leading-snug mb-3">${item.title}</h3>
          ${item.summary || item.content ? `<p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-3 leading-relaxed">${item.summary || item.content?.slice(0,200)}</p>` : ''}
        </a>
      `;
    }

    function renderHotItem(item) {
      const mainUrl = (item.urls && item.urls[0]) || item.url || '#';
      const sources = (item.sources || []).join(' · ');
      return `
        <a href="${mainUrl}" target="_blank" rel="noopener" class="block p-4 rounded-2xl hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors -mx-2">
          <h3 class="font-bold text-base mb-1.5 leading-snug">${item.title}</h3>
          ${item.summary ? `<p class="text-sm text-gray-500 dark:text-gray-400 mb-2">${item.summary}</p>` : ''}
          <p class="text-[11px] text-gray-400 font-medium">${sources}</p>
        </a>
      `;
    }

    function renderEmpty(msg) {
      return `<p class="text-gray-400 col-span-full text-center py-16 text-sm">${msg}</p>`;
    }

    // ===== Init =====
    function init() {
      if (!DATA || !DATA.date) return;

      document.getElementById('header-date').textContent = `${DATA.date} · ${new Date(DATA.updatedAt).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})} 更新`;
      document.getElementById('heat-index').textContent = DATA.heatIndex || '--';

      if (DATA.hotItems?.length > 0) {
        document.getElementById('hot-section').classList.remove('hidden');
        document.getElementById('hot-items').innerHTML = DATA.hotItems.map(renderHotItem).join('');
      }

      const sections = {
        'github-list': { data: DATA.github, render: renderCard },
        'embodied-list': { data: DATA.embodied, render: renderCard },
        'autoAi-list': { data: DATA.autoAi, render: renderCard },
        'testing-list': { data: DATA.testing, render: renderCard },
        'labs-list': { data: DATA.labs, render: renderCard },
        'media-list': { data: DATA.media, render: renderCard },
        'weekly-list': { data: DATA.weekly, render: renderWeeklyCard },
        'papers-list': { data: DATA.papers, render: renderCard },
        'community-list': { data: DATA.community, render: renderCard },
        'china-list': { data: DATA.china, render: renderCard },
      };

      for (const [id, { data, render }] of Object.entries(sections)) {
        const el = document.getElementById(id);
        if (data?.length > 0) {
          el.innerHTML = data.map(render).join('');
        } else {
          el.innerHTML = renderEmpty('暂无数据');
        }
      }

      if (DATA.stats) {
        document.getElementById('footer-stats').textContent =
          `${DATA.stats.successSources}/${DATA.stats.totalSources} 源成功` +
          (DATA.stats.failedSources?.length > 0 ? ` · ${DATA.stats.failedSources.length} 源跳过` : '');
      }
    }

    init();

    // ===== 关键词过滤 =====
    let activeKeyword = null;

    function filterByKeyword(keyword) {
      activeKeyword = keyword;
      const allCards = document.querySelectorAll('.tab-content .card');

      if (!keyword) {
        // 清除筛选 → 显示全部
        allCards.forEach(card => card.style.display = '');
        document.getElementById('keyword-clear').classList.add('hidden');
        document.querySelectorAll('.kw-pill').forEach(p => {
          p.classList.remove('bg-blue-500', 'text-white', 'dark:bg-blue-600');
          p.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
        });
        return;
      }

      const kw = keyword.toLowerCase();
      allCards.forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(kw) ? '' : 'none';
      });

      document.getElementById('keyword-clear').classList.remove('hidden');
    }

    // 关键词按钮点击
    document.querySelectorAll('.kw-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const kw = pill.dataset.kw;

        // 切换选中状态
        if (activeKeyword === kw) {
          filterByKeyword(null);
          return;
        }

        // 重置所有按钮样式
        document.querySelectorAll('.kw-pill').forEach(p => {
          p.classList.remove('bg-blue-500', 'text-white', 'dark:bg-blue-600');
          p.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
        });

        // 激活当前按钮
        pill.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400');
        pill.classList.add('bg-blue-500', 'text-white', 'dark:bg-blue-600');

        filterByKeyword(kw);
      });
    });

    // 清除按钮
    document.getElementById('keyword-clear').addEventListener('click', () => {
      filterByKeyword(null);
    });
  </script>
</body>
</html>
